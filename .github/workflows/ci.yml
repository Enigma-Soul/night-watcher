name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── PR 时编译，产物存入缓存 ──
  build:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        run: pip install uv

      - name: 安装依赖
        run: uv sync

      - name: 安装 PyInstaller
        run: uv pip install pyinstaller

      - name: 打包 exe
        run: uv run pyinstaller --onefile --name night-watcher --noconsole main.py

      - name: 缓存编译产物
        uses: actions/cache/save@v4
        with:
          path: dist/night-watcher.exe
          key: nw-exe-${{ hashFiles('uv.lock', '**/*.py') }}

  # ── 合并后直接取缓存发版，不重新编译 ──
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 恢复编译产物
        uses: actions/cache/restore@v4
        with:
          path: dist/night-watcher.exe
          key: nw-exe-${{ hashFiles('uv.lock', '**/*.py') }}
          fail-on-cache-miss: true

      - name: 解析 CHANGELOG 获取版本
        id: changelog
        shell: pwsh
        run: |
          $changelog = Get-Content -Raw -Path CHANGELOG.md
          if ($changelog -match '^#\s+([\d.]+)') {
            $version = $matches[1].Trim()
            echo "version=$version" >> $env:GITHUB_OUTPUT
            echo "Found version: $version"
          } else {
            echo "version=0.0.0" >> $env:GITHUB_OUTPUT
            echo "WARNING: No version found in CHANGELOG.md"
          }
          $lines = $changelog -split "`n"
          $body = @()
          $inBody = $false
          foreach ($line in $lines) {
            if ($line -match '^#\s+[\d.]+') {
              if ($inBody) { break }
              $inBody = $true
              continue
            }
            if ($inBody) { $body += $line }
          }
          $bodyText = ($body -join "`n").Trim()
          Set-Content -Path release_body.md -Value $bodyText -Encoding UTF8

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.changelog.outputs.version }}
          name: v${{ steps.changelog.outputs.version }}
          body_path: release_body.md
          files: dist/night-watcher.exe
          draft: false
          prerelease: false
