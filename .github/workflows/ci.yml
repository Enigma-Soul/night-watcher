name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # ── 恢复缓存的 exe 产物 ──
      - name: 恢复编译产物
        id: cache-exe
        uses: actions/cache@v4
        with:
          path: dist/night-watcher.exe
          key: nw-exe-${{ hashFiles('uv.lock', '**/*.py') }}

      # ── 缓存命中且是合并发版 → 跳过编译 ──
      - name: 安装 uv
        if: steps.cache-exe.outputs.cache-hit != 'true'
        run: pip install uv

      - name: 安装依赖
        if: steps.cache-exe.outputs.cache-hit != 'true'
        run: uv sync

      - name: 安装 PyInstaller
        if: steps.cache-exe.outputs.cache-hit != 'true'
        run: uv pip install pyinstaller

      - name: 打包 exe
        id: pack
        if: steps.cache-exe.outputs.cache-hit != 'true'
        run: uv run pyinstaller --onefile --name night-watcher --noconsole main.py

      # 打包失败 → 删除缓存的 exe，防止保存损坏的产物
      - name: 打包失败清理
        if: failure()
        run: Remove-Item -Force dist/night-watcher.exe -ErrorAction SilentlyContinue
        shell: pwsh

      # ── 仅 push 到 main（PR 合并）时发版 ──
      - name: 解析 CHANGELOG 获取版本
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: changelog
        shell: pwsh
        run: |
          $changelog = Get-Content -Raw -Path CHANGELOG.md
          if ($changelog -match '^#\s+([\d.]+)') {
            $version = $matches[1].Trim()
            echo "version=$version" >> $env:GITHUB_OUTPUT
            echo "Found version: $version"
          } else {
            echo "version=0.0.0" >> $env:GITHUB_OUTPUT
            echo "WARNING: No version found in CHANGELOG.md"
          }
          $lines = $changelog -split "`n"
          $body = @()
          $inBody = $false
          foreach ($line in $lines) {
            if ($line -match '^#\s+[\d.]+') {
              if ($inBody) { break }
              $inBody = $true
              continue
            }
            if ($inBody) { $body += $line }
          }
          $bodyText = ($body -join "`n").Trim()
          Set-Content -Path release_body.md -Value $bodyText -Encoding UTF8

      - name: 创建 GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.changelog.outputs.version }}
          name: v${{ steps.changelog.outputs.version }}
          body_path: release_body.md
          files: dist/night-watcher.exe
          draft: false
          prerelease: false
