name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        run: pip install uv

      - name: 安装依赖
        run: uv sync

      - name: 安装 PyInstaller
        run: uv pip install pyinstaller

      - name: 打包 exe
        run: uv run pyinstaller --name night-watcher --noconsole main.py

      - name: 打包为 zip
        shell: pwsh
        run: Compress-Archive -Path dist/night-watcher/* -DestinationPath dist/night-watcher.zip

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: night-watcher
          path: dist/night-watcher.zip

      - name: 解析 CHANGELOG 获取版本
        id: changelog
        shell: pwsh
        run: |
          $changelog = Get-Content -Raw -Path CHANGELOG.md
          if ($changelog -match '^#\s+([\d.]+)') {
            $version = $matches[1].Trim()
            echo "version=$version" >> $env:GITHUB_OUTPUT
            echo "Found version: $version"
          } else {
            echo "version=0.0.0" >> $env:GITHUB_OUTPUT
            echo "WARNING: No version found in CHANGELOG.md"
          }
          $lines = $changelog -split "`n"
          $body = @()
          $inBody = $false
          foreach ($line in $lines) {
            if ($line -match '^#\s+[\d.]+') {
              if ($inBody) { break }
              $inBody = $true
              continue
            }
            if ($inBody) { $body += $line }
          }
          $bodyText = ($body -join "`n").Trim()
          Set-Content -Path release_body.md -Value $bodyText -Encoding UTF8

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.changelog.outputs.version }}
          name: v${{ steps.changelog.outputs.version }}
          body_path: release_body.md
          files: dist/night-watcher.zip
          draft: false
          prerelease: false
